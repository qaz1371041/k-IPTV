name: 定时更新直播源

on:
  schedule:
    # 每天 UTC 时间 22:00 运行（北京时间 6:00）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install requests aiohttp
      
      - name: 运行更新脚本
        run: |
          python main.py
      
      - name: 提交并推送更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          git diff --staged --quiet || git commit -m "自动更新直播源 $(date +'%Y-%m-%d')"
          git push
