name: Update IPTV List

on:
  schedule:
    - cron: '0 2,14 * * *'   # 每天 UTC 2:00 和 14:00（即北京时间 10:00 和 22:00）
  workflow_dispatch:          # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 需要写权限以便推送

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run update script
        run: python update_iptv.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.m3u README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto update IPTV list $(date +'%Y-%m-%d %H:%M')" && git push)
