name: Auto Update IPTV

on:
  schedule:
    # 每天 UTC 2:00 和 14:00，对应北京时间 10:00 和 22:00
    - cron: '0 2,14 * * *'
  workflow_dispatch:          # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 允许推送代码

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        run: python update_iptv.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto update IPTV lists $(date +'%Y-%m-%d %H:%M')" && git push)
